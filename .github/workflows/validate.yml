name: Validate integration

on:
  workflow_dispatch:
  schedule:
    - cron: "17 8 * * 1"
  push:
    branches:
      - main
    paths:
      - "custom_components/**"
      - "tests/**"
      - "scripts/**"
      - "hacs.json"
      - "LICENSE"
      - "README.md"
      - ".github/workflows/validate.yml"
  pull_request:
    paths:
      - "custom_components/**"
      - "tests/**"
      - "scripts/**"
      - "hacs.json"
      - "LICENSE"
      - "README.md"
      - ".github/workflows/validate.yml"

permissions:
  contents: read

jobs:
  static-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install validation tools
        run: python -m pip install --disable-pip-version-check -q aiohttp pytest ruff==0.11.13 pyyaml
      - name: Compile integration
        run: python -m compileall -q custom_components tests scripts
      - name: Run regression tests
        run: |
          set -o pipefail
          pytest -q --tb=short 2>&1 | tee pytest-output.txt
      - name: Upload regression output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output
          path: pytest-output.txt
      - name: Lint integration and tests
        run: |
          set -o pipefail
          ruff check custom_components tests scripts 2>&1 | tee ruff-output.txt
      - name: Upload lint output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-output
          path: ruff-output.txt
      - name: Validate repository, manifest, and service metadata
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import yaml

          components = Path("custom_components")
          domains = sorted(path.name for path in components.iterdir() if path.is_dir())
          if domains != ["open_data"]:
              raise SystemExit(f"expected only custom_components/open_data, found: {domains}")

          if not Path("LICENSE").is_file():
              raise SystemExit("LICENSE is required")

          hacs = json.loads(Path("hacs.json").read_text(encoding="utf-8"))
          if hacs.get("name") != "Open Data":
              raise SystemExit("hacs.json name must be Open Data")

          root = components / "open_data"
          manifest = json.loads((root / "manifest.json").read_text(encoding="utf-8"))
          required = {
              "domain",
              "name",
              "version",
              "config_flow",
              "iot_class",
              "documentation",
              "issue_tracker",
          }
          missing = sorted(required - manifest.keys())
          if missing:
              raise SystemExit(f"manifest.json missing keys: {missing}")
          if manifest["domain"] != "open_data":
              raise SystemExit("manifest domain must be open_data")

          manifest_keys = list(manifest)
          expected_key_order = ["domain", "name", *sorted(manifest_keys[2:])]
          if manifest_keys != expected_key_order:
              raise SystemExit(
                  f"manifest keys must be domain, name, then alphabetical: {manifest_keys}"
              )

          init_source = (root / "__init__.py").read_text(encoding="utf-8")
          if "CONFIG_SCHEMA = cv.config_entry_only_config_schema(DOMAIN)" not in init_source:
              raise SystemExit("integration must declare a config-entry-only CONFIG_SCHEMA")

          services = yaml.safe_load((root / "services.yaml").read_text(encoding="utf-8"))
          expected = {
              "scan_portal",
              "search_datasets",
              "inspect_dataset",
              "refresh_entry",
              "feedback_preview",
          }
          missing_services = sorted(expected - set(services or {}))
          if missing_services:
              raise SystemExit(f"services.yaml missing services: {missing_services}")
          PY

  live-gtfs-corpus:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Inspect public GTFS feed corpus
        run: python scripts/validate_gtfs_feeds.py --output gtfs-feed-results.json
      - name: Upload GTFS feed report
        uses: actions/upload-artifact@v4
        with:
          name: gtfs-feed-results
          path: gtfs-feed-results.json
