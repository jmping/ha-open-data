name: Validate integration

on:
  workflow_dispatch:
  schedule:
    - cron: "17 8 * * 1"
  push:
    branches:
      - main
    paths:
      - "custom_components/**"
      - "tests/**"
      - "hacs.json"
      - "LICENSE"
      - "README.md"
      - ".github/workflows/validate.yml"
  pull_request:
    paths:
      - "custom_components/**"
      - "tests/**"
      - "hacs.json"
      - "LICENSE"
      - "README.md"
      - ".github/workflows/validate.yml"

permissions:
  contents: read

jobs:
  static-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install validation tools
        run: python -m pip install pytest ruff pyyaml
      - name: Compile integration
        run: python -m compileall -q custom_components tests
      - name: Run regression tests
        run: pytest -q
      - name: Lint integration and tests
        run: ruff check custom_components tests
      - name: Validate repository, manifest, and service metadata
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import yaml
          components = Path('custom_components')
          domains = sorted(path.name for path in components.iterdir() if path.is_dir())
          assert domains==['open_data']
          PY
  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: home-assistant/actions/hassfest@master
  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: hacs/action@main
        with:
          category: integration