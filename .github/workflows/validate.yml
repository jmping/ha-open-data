name: Validate integration

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "custom_components/**"
      - "README.md"
      - ".github/workflows/validate.yml"
  pull_request:
    paths:
      - "custom_components/**"
      - "README.md"
      - ".github/workflows/validate.yml"

permissions:
  contents: read

jobs:
  static-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install validation tools
        run: python -m pip install ruff pyyaml
      - name: Compile integration
        run: python -m compileall -q custom_components
      - name: Lint integration
        run: ruff check custom_components
      - name: Validate manifest and service metadata
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import yaml

          root = Path("custom_components/open_data")
          manifest = json.loads((root / "manifest.json").read_text(encoding="utf-8"))
          required = {"domain", "name", "version", "config_flow", "iot_class"}
          missing = sorted(required - manifest.keys())
          if missing:
              raise SystemExit(f"manifest.json missing keys: {missing}")
          if manifest["domain"] != "open_data":
              raise SystemExit("manifest domain must be open_data")
          services = yaml.safe_load((root / "services.yaml").read_text(encoding="utf-8"))
          expected = {
              "scan_portal",
              "search_datasets",
              "inspect_dataset",
              "refresh_entry",
              "feedback_preview",
          }
          missing_services = sorted(expected - set(services or {}))
          if missing_services:
              raise SystemExit(f"services.yaml missing services: {missing_services}")
          PY

  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
