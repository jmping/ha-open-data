inspect_portal:
  name: Inspect portal
  description: Validate a public portal, auto-detect its provider, and return normalized capabilities.
  fields:
    portal_url:
      name: Portal URL
      required: true
      selector:
        text:

scan_portal:
  name: Scan portal
  description: Auto-detect a public portal and scan broad catalog slices for normalized dataset candidates.
  fields:
    portal_url:
      name: Portal URL
      required: true
      selector:
        text:
    limit:
      name: Result limit
      default: 50
      selector:
        number:
          min: 1
          max: 100
          mode: box

search_datasets:
  name: Search datasets
  description: Auto-detect and search one open-data portal, returning normalized dataset metadata.
  fields:
    portal_url:
      name: Portal URL
      required: true
      selector:
        text:
    query:
      name: Query
      selector:
        text:
    limit:
      name: Result limit
      default: 20
      selector:
        number:
          min: 1
          max: 100
          mode: box

inspect_dataset:
  name: Explore dataset
  description: Resolve a dataset and return schema, sample-based structural analysis, ranked field hypotheses, metrics, dimensions, and whether user confirmation is recommended.
  fields:
    portal_url:
      name: Portal URL
      required: true
      selector:
        text:
    dataset_id:
      name: Dataset ID
      required: true
      selector:
        text:
    resource_id:
      name: Resource ID
      selector:
        text:
    sample_limit:
      name: Sample row limit
      description: More rows improve location-by-time bundle detection but increase portal requests.
      default: 100
      selector:
        number:
          min: 10
          max: 200
          mode: box

refresh_entry:
  name: Refresh entry
  description: Request an immediate refresh of a loaded Open Data config entry.
  fields:
    entry_id:
      name: Config entry ID
      required: true
      selector:
        config_entry:
          integration: open_data

feedback_preview:
  name: Preview feedback
  description: Build a privacy-safe metadata report and show whether local deduplication would suppress it.
  fields:
    portal_id:
      name: Portal ID
      required: true
      selector:
        text:
    metadata:
      name: Public metadata
      required: true
      selector:
        object:
